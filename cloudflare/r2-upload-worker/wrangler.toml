name = "tanjamall-r2-upload"
main = "src/index.ts"
compatibility_date = "2026-06-29"

[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "tanjamall-product-images"

[vars]
PUBLIC_IMAGE_BASE_URL = "https://images.tanjamall.com"
ALLOWED_ORIGINS = "https://tanjamall.com,https://www.tanjamall.com,http://127.0.0.1:5173,http://localhost:5173"

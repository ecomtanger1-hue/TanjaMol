  <path d="M43.5 73h13v8h-13Z" fill="#131921"/>
  <path d="M30 66c11.5 8 28.5 8 40 0" fill="none" stroke="#fffdf8" stroke-linecap="round" stroke-width="7.5"/>

  <text class="word" x="116" y="66" fill="#131921">Tanja</text>

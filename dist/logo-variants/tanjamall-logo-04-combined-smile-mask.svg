  <style>
    .word { font-family: "Tajawal", "Cairo", "Aptos Display", Arial, sans-serif; font-size: 50px; font-weight: 800; letter-spacing: -0.5px; }
    .tag { font-family: "Tajawal", "Cairo", Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0; }
  </style>

  <rect x="8" y="12" width="84" height="84" rx="18" fill="#ff9900"/>

